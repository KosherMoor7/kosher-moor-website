<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A08"/>
      <stop offset="50%" style="stop-color:#1A4A2E"/>
      <stop offset="100%" style="stop-color:#0A0A08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A07830"/>
      <stop offset="50%" style="stop-color:#C8A951"/>
      <stop offset="100%" style="stop-color:#A07830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#C8A951" stroke-width="1.5" opacity="0.4"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#C8A951" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornaments -->
  <text x="40" y="75" font-size="36" fill="#C8A951" opacity="0.6">◆</text>
  <text x="1120" y="75" font-size="36" fill="#C8A951" opacity="0.6">◆</text>
  <text x="40" y="615" font-size="36" fill="#C8A951" opacity="0.6">◆</text>
  <text x="1120" y="615" font-size="36" fill="#C8A951" opacity="0.6">◆</text>

  <!-- Top eyebrow -->
  <text x="600" y="160" font-family="Georgia, serif" font-size="18" fill="#C8A951" opacity="0.7" text-anchor="middle" letter-spacing="8">◆ SOVEREIGN MARKETPLACE ◆</text>

  <!-- Main title -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="88" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="4">THE KOSHER</text>
  <text x="600" y="390" font-family="Georgia, serif" font-size="88" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="4">MOOR</text>

  <!-- Divider line -->
  <line x1="300" y1="430" x2="900" y2="430" stroke="#C8A951" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="490" font-family="Georgia, serif" font-size="24" fill="#F5EDD8" opacity="0.8" text-anchor="middle" letter-spacing="2">Heritage · Health · Power · Purpose</text>

  <!-- Website -->
  <text x="600" y="560" font-family="monospace" font-size="18" fill="#C8A951" opacity="0.6" text-anchor="middle" letter-spacing="3">thekoshermoor.com</text>
</svg>
