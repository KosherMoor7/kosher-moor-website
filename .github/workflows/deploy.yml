name: Deploy The Kosher Moor

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Validate the Node.js backend ──────────────────────────────────────────
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

  # ── Deploy static site to GitHub Pages ────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp 404.html _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp CNAME _site/
          cp .nojekyll _site/
          cp _headers _site/
          [ -f og-image.svg ] && cp og-image.svg _site/
          [ -f og-image.jpg ] && cp og-image.jpg _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
